spring.config.activate.on-profile=test-mysql

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=password

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create-drop

spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=BOOLEAN
spring.jpa.properties.hibernate.mapping.force_enums_to_string=true

spring.h2.console.enabled=false

spring.ai.gemini.url=https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent