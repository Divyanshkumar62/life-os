spring.application.name=player-service
spring.jackson.serialization.fail-on-empty-beans=false

spring.datasource.url=jdbc:h2:mem:lifedb
spring.datasource.username=sa
spring.datasource.password=password

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.main.allow-bean-definition-overriding=true

spring.ai.gemini.api-key=${GEMINI_API_KEY:}
spring.ai.gemini.url=https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash-8b:generateContent