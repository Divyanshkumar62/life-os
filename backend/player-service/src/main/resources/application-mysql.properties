spring.config.activate.on-profile=mysql

spring.datasource.url=jdbc:mysql://localhost:3306/lifedb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=BOOLEAN
spring.jpa.properties.hibernate.mapping.force_enums_to_string=true

spring.ai.gemini.api-key=${GEMINI_API_KEY:}
spring.ai.gemini.url=https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent