# ---------------------------------------------------------------------------
# Test profile for AwakeningApiTest (Phase 1 Awakening Penalty API contract).
# Boots the FULL application context on an in-memory H2 database so that
# REST Assured can exercise the real OnboardingController -> OnboardingService
# -> repository stack over HTTP. Collaborators that would make live LLM calls
# are replaced via @MockBean inside the test class.
# ---------------------------------------------------------------------------

# --- In-memory database (MySQL compatibility mode) ---
spring.datasource.url=jdbc:h2:mem:awakening;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate build the schema from the JPA entities for each run.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.sql.init.mode=never

# --- Dummy AI keys ---
# GeminiConfessionService / DungeonArchitectService read `spring.ai.gemini.api-key`
# with NO default value, so the context fails to start without this even though
# those beans are never invoked by the Awakening tests.
spring.ai.gemini.api-key=test-key
gemini.api.key=test-key
